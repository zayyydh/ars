version: "3.9"

# What this file does:
#   docker-compose up       → starts postgres + redis + flask + celery worker
#   docker-compose up db    → starts only postgres (useful for running Flask locally)
#   docker-compose down -v  → stops everything and removes volumes (fresh start)

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       resume_screener
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Flask API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV:           development
      DATABASE_URL:        postgresql://postgres:password@db:5432/resume_screener
      REDIS_URL:           redis://redis:6379/0
      CELERY_BROKER_URL:   redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OPENAI_API_KEY:      ${OPENAI_API_KEY}   # Pass from your shell env
      LLM_PROVIDER:        openai
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - .:/app                              # Hot reload in development
    command: flask --app wsgi run --host 0.0.0.0 --debug

  # ── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL:        postgresql://postgres:password@db:5432/resume_screener
      REDIS_URL:           redis://redis:6379/0
      CELERY_BROKER_URL:   redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OPENAI_API_KEY:      ${OPENAI_API_KEY}
      LLM_PROVIDER:        openai
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - .:/app
    # --loglevel=info shows task start/success/failure
    # --concurrency=2 runs 2 tasks in parallel per worker
    command: celery -A wsgi:celery worker --loglevel=info --concurrency=2

volumes:
  postgres_data: