version: "3.9"

# One command to start the entire stack:
#   docker-compose up --build
#
# Services:
#   db       → PostgreSQL on :5432
#   redis    → Redis on :6379
#   api      → Flask API on :5000
#   worker   → Celery background worker
#   frontend → React (nginx) on :3000

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       resume_screener
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV:              development
      DATABASE_URL:           postgresql://postgres:password@db:5432/resume_screener
      REDIS_URL:              redis://redis:6379/0
      CELERY_BROKER_URL:      redis://redis:6379/0
      CELERY_RESULT_BACKEND:  redis://redis:6379/0
      OPENAI_API_KEY:         ${OPENAI_API_KEY}
      LLM_PROVIDER:           ${LLM_PROVIDER:-openai}
      CORS_ORIGINS:           http://localhost:3000
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    command: flask --app wsgi run --host 0.0.0.0 --port 5000 --debug

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL:           postgresql://postgres:password@db:5432/resume_screener
      REDIS_URL:              redis://redis:6379/0
      CELERY_BROKER_URL:      redis://redis:6379/0
      CELERY_RESULT_BACKEND:  redis://redis:6379/0
      OPENAI_API_KEY:         ${OPENAI_API_KEY}
      LLM_PROVIDER:           ${LLM_PROVIDER:-openai}
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
    command: celery -A wsgi:celery worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
